apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-gateway
  namespace: pulsestack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-gateway
  template:
    metadata:
      labels:
        app: pulse-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/pulsestack/pulse-gateway:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: pulsestack-config
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-gateway
  namespace: pulsestack
spec:
  selector:
    app: pulse-gateway
  ports:
    - name: http
      port: 80
      targetPort: 4000
